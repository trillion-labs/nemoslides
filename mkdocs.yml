site_name: NemoSlides
site_description: Fine-tuning Nemotron-3-Nano-30B-A3B on synthetic Slidev decks. NVIDIA Nemotron Hackathon 2026, Track B.
site_url: https://trillion-labs.github.io/nemoslides/
repo_url: https://github.com/trillion-labs/nemoslides
repo_name: trillion-labs/nemoslides
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Overview: index.md
  - 01 · Architecture: 01-overview.md
  - 02 · Data: 02-data.md
  - 03 · Training: 03-training.md
  - 04 · Evaluation: 04-evaluation.md
  - 05 · Results: 05-results.md
  - Reproduce: reproduce.md

not_in_nav: |
  assets/diagrams/README.md

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mermaid-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/trillion-labs/nemoslides
    - icon: fontawesome/solid/database
      link: https://huggingface.co/datasets/trillionlabs/slides-sft-v0
      name: Dataset on Hugging Face Hub

copyright: >
  NVIDIA Nemotron Hackathon 2026 · Track B ·
  <a href="https://github.com/trillion-labs/nemoslides">source</a>
